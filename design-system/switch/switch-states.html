<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Switch — states harness</title>
<link rel="stylesheet" href="../theme.css" />
<style>
  /* native checkbox + role=switch; drawn track + thumb (pointer-events:none).
     off-track uses border-strong (3:1 against page) for non-text contrast. */
  .sw{display:inline-flex;align-items:center;gap:var(--space-2);cursor:pointer;
    font-size:var(--font-size-sm);color:var(--text-primary)}
  .sw__ctrl{position:relative;flex:none;inline-size:var(--switch-track-w);block-size:var(--switch-track-h)}
  .sw__ctrl input{position:absolute;inset:0;margin:0;opacity:0;cursor:pointer;z-index:1}
  .sw__ctrl input:disabled{cursor:not-allowed}
  .sw__track{pointer-events:none;position:absolute;inset:0;border-radius:var(--radius-full);
    background:var(--switch-track-off);transition:background-color var(--transition-micro),box-shadow var(--transition-micro)}
  .sw__thumb{pointer-events:none;position:absolute;inset-block-start:50%;inset-inline-start:var(--space-0-5);
    transform:translateY(-50%);inline-size:var(--switch-thumb-size);block-size:var(--switch-thumb-size);
    border-radius:var(--radius-full);background:var(--switch-thumb);
    box-shadow:0 1px 2px rgba(0,0,0,.25);transition:inset-inline-start var(--transition-micro)}
  .sw__ctrl input:checked ~ .sw__track{background:var(--switch-track-on)}
  .sw__ctrl input:checked ~ .sw__thumb{inset-inline-start:calc(var(--switch-track-w) - var(--switch-thumb-size) - var(--space-0-5))}
  .sw__ctrl input:focus-visible ~ .sw__track{box-shadow:var(--focus-ring)}
  .sw:has(input:disabled){opacity:.5;cursor:not-allowed}

  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-page);color:var(--text-primary);font-family:Inter,system-ui,sans-serif;padding:32px}
  .stack{display:flex;flex-direction:column;gap:24px;max-width:560px;margin:0 auto}
  .row{display:flex;flex-wrap:wrap;gap:24px;align-items:center}
  .card{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);
    border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:var(--space-4);max-inline-size:420px}
  .card__t{font-size:var(--font-size-base);font-weight:var(--font-weight-medium);color:var(--text-primary)}
  .card__d{font-size:var(--font-size-sm);color:var(--text-secondary)}
  .grp-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);margin:0 0 8px}
  [data-theme="dark"] .grp-label{color:var(--gray-400)}
</style>
</head>
<body>
  <main class="stack">
    <section>
      <p class="grp-label">States</p>
      <div class="row">
        <label class="sw"><span class="sw__ctrl"><input type="checkbox" role="switch" /><span class="sw__track"></span><span class="sw__thumb"></span></span>Off</label>
        <label class="sw"><span class="sw__ctrl"><input type="checkbox" role="switch" checked /><span class="sw__track"></span><span class="sw__thumb"></span></span>On</label>
        <label class="sw"><span class="sw__ctrl"><input type="checkbox" role="switch" disabled /><span class="sw__track"></span><span class="sw__thumb"></span></span>Disabled off</label>
        <label class="sw"><span class="sw__ctrl"><input type="checkbox" role="switch" checked disabled /><span class="sw__track"></span><span class="sw__thumb"></span></span>Disabled on</label>
      </div>
    </section>
    <section>
      <p class="grp-label">In context (settings row)</p>
      <div class="card">
        <span><span class="card__t">Marketing emails</span><br /><span class="card__d">Receive emails about new products and features.</span></span>
        <label class="sw"><span class="sw__ctrl"><input type="checkbox" role="switch" checked aria-label="Marketing emails" /><span class="sw__track"></span><span class="sw__thumb"></span></span></label>
      </div>
    </section>
  </main>
</body>
</html>
