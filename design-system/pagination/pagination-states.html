<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pagination - states harness</title>
<link rel="stylesheet" href="../theme.css" />
<style>
  /* === Pagination (mirrors pagination.tsx) ================================ */
  .pg{display:flex;width:100%;justify-content:center}
  .pg-content{display:flex;flex-direction:row;align-items:center;gap:var(--space-1);list-style:none;margin:0;padding:0}
  .pg-link{
    display:inline-flex;align-items:center;justify-content:center;
    width:var(--control-sm);height:var(--control-sm);
    border-radius:var(--button-radius);border:1px solid var(--button-outline-border);
    background:var(--button-outline-bg);color:var(--text-primary);
    font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);
    text-decoration:none;cursor:pointer;
    transition:background var(--duration-fast) var(--ease-out);
  }
  .pg-link svg{width:var(--icon-sm);height:var(--icon-sm);stroke:currentColor;fill:none;stroke-width:2}
  .pg-link:hover,.pg-link.s-hover{background:var(--button-outline-bg-hover)}
  .pg-link:focus-visible{outline:none;box-shadow:var(--button-focus-ring)}
  .pg-link[aria-current="page"]{
    border-color:var(--interactive-selected-border);
    background:var(--interactive-selected-bg);
    color:var(--interactive-selected-text);
  }
  .pg-link[aria-disabled="true"]{pointer-events:none;opacity:.5}
  .pg-link.wide{width:auto;padding:0 var(--space-3)}
  .pg-ellipsis{
    display:flex;width:var(--control-sm);height:var(--control-sm);
    align-items:center;justify-content:center;color:var(--text-secondary);
  }
  .pg-ellipsis svg{width:var(--icon-sm);height:var(--icon-sm);stroke:currentColor;fill:none;stroke-width:2}

  /* === Harness chrome ===================================================== */
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-page);color:var(--text-primary);font-family:Inter,system-ui,sans-serif;padding:32px} /* ds-allow-hardcode: harness chrome */
  .stack{display:flex;flex-direction:column;gap:32px;max-inline-size:680px;margin:0 auto} /* ds-allow-hardcode: harness chrome */
  .grp-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);margin:0 0 8px}
  [data-theme="dark"] .grp-label{color:var(--gray-400)}
</style>
</head>
<body>
  <main class="stack">
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <symbol id="i-chev-left" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></symbol>
      <symbol id="i-chev-right" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
      <symbol id="i-dots" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></symbol>
    </svg>

    <!-- 1. Basic — page 1 of 5 -->
    <section>
      <p class="grp-label">Page 1 of 5</p>
      <nav class="pg" aria-label="Pagination">
        <ul class="pg-content">
          <li><a class="pg-link" href="#" aria-label="Go to previous page" aria-disabled="true" tabindex="-1"><svg><use href="#i-chev-left"/></svg></a></li>
          <li><a class="pg-link" href="#" aria-current="page">1</a></li>
          <li><a class="pg-link" href="#">2</a></li>
          <li><a class="pg-link" href="#">3</a></li>
          <li><a class="pg-link" href="#">4</a></li>
          <li><a class="pg-link" href="#">5</a></li>
          <li><a class="pg-link" href="#" aria-label="Go to next page"><svg><use href="#i-chev-right"/></svg></a></li>
        </ul>
      </nav>
    </section>

    <!-- 2. Page 3 of 10 with ellipsis -->
    <section>
      <p class="grp-label">Page 3 of 10 — with ellipsis</p>
      <nav class="pg" aria-label="Pagination">
        <ul class="pg-content">
          <li><a class="pg-link" href="#" aria-label="Go to previous page"><svg><use href="#i-chev-left"/></svg></a></li>
          <li><a class="pg-link" href="#">1</a></li>
          <li><a class="pg-link" href="#">2</a></li>
          <li><a class="pg-link" href="#" aria-current="page">3</a></li>
          <li><a class="pg-link" href="#">4</a></li>
          <li><a class="pg-link" href="#">5</a></li>
          <li><span class="pg-ellipsis" aria-hidden="true"><svg><use href="#i-dots"/></svg></span></li>
          <li><a class="pg-link" href="#">10</a></li>
          <li><a class="pg-link" href="#" aria-label="Go to next page"><svg><use href="#i-chev-right"/></svg></a></li>
        </ul>
      </nav>
    </section>

    <!-- 3. Compact — previous / page count / next -->
    <section>
      <p class="grp-label">Compact — prev / count text / next</p>
      <nav class="pg" aria-label="Pagination">
        <ul class="pg-content">
          <li><a class="pg-link" href="#" aria-label="Go to previous page"><svg><use href="#i-chev-left"/></svg></a></li>
          <li><span style="font-size:var(--font-size-sm);color:var(--text-secondary);padding:0 var(--space-2)">Page 5 of 20</span></li>
          <li><a class="pg-link" href="#" aria-label="Go to next page"><svg><use href="#i-chev-right"/></svg></a></li>
        </ul>
      </nav>
    </section>

    <!-- 4. Link states — hover, focus, active, disabled -->
    <section>
      <p class="grp-label">Link states — hover / active / disabled</p>
      <nav class="pg" aria-label="Pagination">
        <ul class="pg-content">
          <li><a class="pg-link" aria-label="Go to previous page" aria-disabled="true" tabindex="-1"><svg><use href="#i-chev-left"/></svg></a></li>
          <li><a class="pg-link" href="#">1</a></li>
          <li><a class="pg-link s-hover" href="#">2 (hover)</a></li>
          <li><a class="pg-link" href="#" aria-current="page">3 (active)</a></li>
          <li><a class="pg-link" style="box-shadow:var(--button-focus-ring);outline:none" href="#">4 (focus)</a></li>
          <li><a class="pg-link" href="#" aria-label="Go to next page"><svg><use href="#i-chev-right"/></svg></a></li>
        </ul>
      </nav>
    </section>

    <!-- 5. Dark mode -->
    <section data-theme="dark" style="background:var(--surface-page);padding:24px;border-radius:var(--radius-lg)">
      <p class="grp-label">Dark mode</p>
      <nav class="pg" aria-label="Pagination">
        <ul class="pg-content">
          <li><a class="pg-link" href="#" aria-label="Go to previous page"><svg><use href="#i-chev-left"/></svg></a></li>
          <li><a class="pg-link" href="#">1</a></li>
          <li><a class="pg-link" href="#">2</a></li>
          <li><a class="pg-link" href="#" aria-current="page">3</a></li>
          <li><span class="pg-ellipsis" aria-hidden="true"><svg><use href="#i-dots"/></svg></span></li>
          <li><a class="pg-link" href="#">10</a></li>
          <li><a class="pg-link" href="#" aria-label="Go to next page"><svg><use href="#i-chev-right"/></svg></a></li>
        </ul>
      </nav>
    </section>

  </main>
</body>
</html>
