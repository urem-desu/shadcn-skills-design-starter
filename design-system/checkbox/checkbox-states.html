<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Checkbox - states harness</title>
<link rel="stylesheet" href="../theme.css" />
<style>
  /* thin custom control: real <input> on top (transparent, gets clicks);
     drawn .cbx__box overlay (pointer-events:none); check + dash are two <path>
     in ONE <svg> toggled by :checked / :indeterminate - identical stroke weight. */
  .cbx{display:inline-flex;align-items:flex-start;gap:var(--space-2);cursor:pointer;
    font-size:var(--font-size-sm);color:var(--text-primary);line-height:var(--line-tight)}
  .cbx__ctrl{position:relative;display:inline-grid;place-items:center;flex:none;
    inline-size:var(--control-box-size);block-size:var(--control-box-size)}
  .cbx__ctrl input{position:absolute;inset:0;margin:0;opacity:0;cursor:pointer}
  .cbx__ctrl input:disabled{cursor:not-allowed}
  .cbx__box{pointer-events:none;inline-size:100%;block-size:100%;display:grid;place-items:center;
    border:1.5px solid var(--control-box-border);border-radius:var(--checkbox-radius);background:var(--control-box-bg);
    transition:background-color var(--transition-micro),border-color var(--transition-micro),box-shadow var(--transition-micro)}
  .cbx__box svg{inline-size:.62rem;block-size:.62rem;stroke:var(--control-checked-mark);fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .cbx__box svg path{opacity:0}
  .cbx__ctrl input:checked + .cbx__box,
  .cbx__ctrl input:indeterminate + .cbx__box{background:var(--control-checked-bg);border-color:var(--control-checked-bg)}
  .cbx__ctrl input:checked + .cbx__box .check{opacity:1}
  .cbx__ctrl input:indeterminate + .cbx__box .dash{opacity:1}
  .cbx__ctrl input:focus-visible + .cbx__box{box-shadow:var(--focus-ring)}
  .cbx__ctrl input[aria-invalid="true"] + .cbx__box{border-color:var(--border-error)}
  .cbx:has(input:disabled){opacity:.5;cursor:not-allowed}
  .cbx__text{display:flex;flex-direction:column;gap:var(--space-0-5)}
  .cbx__desc{color:var(--text-secondary);font-size:var(--font-size-sm)}

  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-page);color:var(--text-primary);font-family:Inter,system-ui,sans-serif;padding:32px}
  .stack{display:flex;flex-direction:column;gap:20px;max-width:560px;margin:0 auto}
  .row{display:flex;flex-wrap:wrap;gap:24px;align-items:center}
  .grp-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);margin:0 0 8px}
  [data-theme="dark"] .grp-label{color:var(--gray-400)}
</style>
</head>
<body>
  <main class="stack">
    <section>
      <p class="grp-label">States</p>
      <div class="row">
        <label class="cbx"><span class="cbx__ctrl"><input type="checkbox" /><span class="cbx__box"><svg viewBox="0 0 16 16" aria-hidden="true"><path class="check" d="M13 4.5 6.5 11.5 3 8"/><path class="dash" d="M3.5 8h9"/></svg></span></span>Default</label>
        <label class="cbx"><span class="cbx__ctrl"><input type="checkbox" checked /><span class="cbx__box"><svg viewBox="0 0 16 16" aria-hidden="true"><path class="check" d="M13 4.5 6.5 11.5 3 8"/><path class="dash" d="M3.5 8h9"/></svg></span></span>Checked</label>
        <label class="cbx"><span class="cbx__ctrl"><input type="checkbox" id="cbx-ind" /><span class="cbx__box"><svg viewBox="0 0 16 16" aria-hidden="true"><path class="check" d="M13 4.5 6.5 11.5 3 8"/><path class="dash" d="M3.5 8h9"/></svg></span></span>Indeterminate</label>
        <label class="cbx"><span class="cbx__ctrl"><input type="checkbox" disabled /><span class="cbx__box"><svg viewBox="0 0 16 16" aria-hidden="true"><path class="check" d="M13 4.5 6.5 11.5 3 8"/><path class="dash" d="M3.5 8h9"/></svg></span></span>Disabled</label>
        <label class="cbx"><span class="cbx__ctrl"><input type="checkbox" checked disabled /><span class="cbx__box"><svg viewBox="0 0 16 16" aria-hidden="true"><path class="check" d="M13 4.5 6.5 11.5 3 8"/><path class="dash" d="M3.5 8h9"/></svg></span></span>Disabled checked</label>
      </div>
    </section>
    <section>
      <p class="grp-label">With description</p>
      <label class="cbx">
        <span class="cbx__ctrl"><input type="checkbox" checked aria-describedby="cbx-d" /><span class="cbx__box"><svg viewBox="0 0 16 16" aria-hidden="true"><path class="check" d="M13 4.5 6.5 11.5 3 8"/><path class="dash" d="M3.5 8h9"/></svg></span></span>
        <span class="cbx__text">Use different settings for my mobile devices<span class="cbx__desc" id="cbx-d">You can manage your mobile notifications in the settings page.</span></span>
      </label>
    </section>
    <section>
      <p class="grp-label">Error</p>
      <label class="cbx">
        <span class="cbx__ctrl"><input type="checkbox" aria-invalid="true" aria-describedby="cbx-e" /><span class="cbx__box"><svg viewBox="0 0 16 16" aria-hidden="true"><path class="check" d="M13 4.5 6.5 11.5 3 8"/><path class="dash" d="M3.5 8h9"/></svg></span></span>
        <span class="cbx__text">Accept terms and conditions<span class="cbx__desc" id="cbx-e" style="color:var(--feedback-error-text)">You must accept before continuing.</span></span>
      </label>
    </section>
  </main>
  <script>document.getElementById('cbx-ind').indeterminate = true</script>
</body>
</html>
