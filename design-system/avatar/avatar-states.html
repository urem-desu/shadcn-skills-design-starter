<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Avatar — states harness</title>
<link rel="stylesheet" href="../theme.css" />
<style>
  .avatar{
    position:relative;display:inline-flex;flex:none;overflow:hidden;vertical-align:middle;
    border-radius:var(--avatar-radius);background:var(--avatar-bg);
  }
  .avatar--sm{width:var(--control-sm);height:var(--control-sm)}
  .avatar--md{width:var(--control-md);height:var(--control-md)}
  .avatar--lg{width:var(--control-lg);height:var(--control-lg)}
  .avatar .fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--avatar-text)}
  .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .avatar--ring{box-shadow:0 0 0 2px var(--avatar-border)}
  .group{display:flex}
  .group .avatar{box-shadow:0 0 0 2px var(--avatar-border);margin-inline-start:calc(var(--space-2) * -1)}
  .group .avatar:first-child{margin-inline-start:0}

  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-page);color:var(--text-primary);font-family:Inter,system-ui,sans-serif;padding:32px}
  .stack{display:flex;flex-direction:column;gap:24px;max-width:680px;margin:0 auto}
  .row{display:flex;flex-wrap:wrap;gap:16px;align-items:center}
  .grp-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);margin:0 0 8px}
  [data-theme="dark"] .grp-label{color:var(--gray-400)}
</style>
</head>
<body>
  <main class="stack">
    <section>
      <p class="grp-label">Sizes (initials fallback)</p>
      <div class="row">
        <span class="avatar avatar--sm"><span class="fb">CN</span></span>
        <span class="avatar avatar--md"><span class="fb">CN</span></span>
        <span class="avatar avatar--lg"><span class="fb">CN</span></span>
      </div>
    </section>
    <section>
      <p class="grp-label">With image</p>
      <div class="row">
        <span class="avatar avatar--md"><span class="fb">SC</span><img src="https://github.com/shadcn.png" alt="shadcn" /></span>
        <span class="avatar avatar--lg avatar--ring"><span class="fb">VC</span><img src="https://github.com/vercel.png" alt="Vercel" /></span>
      </div>
    </section>
    <section>
      <p class="grp-label">Stacked group</p>
      <div class="group">
        <span class="avatar avatar--md"><span class="fb">AB</span></span>
        <span class="avatar avatar--md"><span class="fb">CD</span></span>
        <span class="avatar avatar--md"><span class="fb">EF</span></span>
        <span class="avatar avatar--md"><span class="fb">+3</span></span>
      </div>
    </section>
  </main>
</body>
</html>
