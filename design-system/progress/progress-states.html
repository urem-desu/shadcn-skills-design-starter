<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Progress - states harness</title>
<link rel="stylesheet" href="../theme.css" />
<style>
  /* === Progress seams ===================================================== */
  :root {
    --progress-h: 8px;
    --progress-radius: var(--radius-full);
  }

  /* === Progress (mirrors progress.tsx) ==================================== */
  .progress{
    position:relative;width:100%;height:var(--progress-h);overflow:hidden;
    border-radius:var(--progress-radius);background:var(--action-secondary);
  }
  .progress-indicator{
    height:100%;width:100%;background:var(--action-primary);
    transition:transform var(--duration-base) var(--ease-out);
  }

  /* Indeterminate shimmer */
  @keyframes progress-shimmer{
    0%{transform:translateX(-100%)}
    100%{transform:translateX(200%)}
  }
  .progress--indeterminate .progress-indicator{
    animation:progress-shimmer 1.5s ease-in-out infinite;
    background:linear-gradient(90deg,var(--action-primary) 0%,var(--blue-300) 50%,var(--action-primary) 100%);
  }

  /* === Labels / helpers =================================================== */
  .prog-row{display:flex;flex-direction:column;gap:var(--space-2)}
  .prog-meta{display:flex;justify-content:space-between;align-items:center}
  .prog-label{font-size:var(--font-size-sm);color:var(--text-secondary)}
  .prog-pct{font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--text-primary)}

  /* === Harness chrome ===================================================== */
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-page);color:var(--text-primary);font-family:Inter,system-ui,sans-serif;padding:32px} /* ds-allow-hardcode: harness chrome */
  .stack{display:flex;flex-direction:column;gap:32px;max-inline-size:480px;margin:0 auto} /* ds-allow-hardcode: harness chrome */
  .grp-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);margin:0 0 8px}
  [data-theme="dark"] .grp-label{color:var(--gray-400)}
</style>
</head>
<body>
  <main class="stack">

    <!-- 1. 0% -->
    <section>
      <p class="grp-label">0% — empty</p>
      <div class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Progress">
        <div class="progress-indicator" style="transform:translateX(-100%)"></div>
      </div>
    </section>

    <!-- 2. 33% -->
    <section>
      <p class="grp-label">33% — partial</p>
      <div class="prog-row">
        <div class="prog-meta">
          <span class="prog-label">Uploading file…</span>
          <span class="prog-pct">33%</span>
        </div>
        <div class="progress" role="progressbar" aria-valuenow="33" aria-valuemin="0" aria-valuemax="100" aria-label="Upload progress">
          <div class="progress-indicator" style="transform:translateX(-67%)"></div>
        </div>
      </div>
    </section>

    <!-- 3. 60% -->
    <section>
      <p class="grp-label">60%</p>
      <div class="progress" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100" aria-label="Progress">
        <div class="progress-indicator" style="transform:translateX(-40%)"></div>
      </div>
    </section>

    <!-- 4. 100% — complete -->
    <section>
      <p class="grp-label">100% — complete</p>
      <div class="prog-row">
        <div class="prog-meta">
          <span class="prog-label">Upload complete</span>
          <span class="prog-pct" style="color:var(--green-600)">Done</span>
        </div>
        <div class="progress" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" aria-label="Upload progress" style="background:var(--green-100)">
          <div class="progress-indicator" style="transform:translateX(0%);background:var(--green-600)"></div>
        </div>
      </div>
    </section>

    <!-- 5. Indeterminate -->
    <section>
      <p class="grp-label">Indeterminate — loading</p>
      <div class="progress progress--indeterminate" role="progressbar" aria-valuetext="indeterminate" aria-label="Loading">
        <div class="progress-indicator"></div>
      </div>
    </section>

    <!-- 6. Thin variant (4px) -->
    <section>
      <p class="grp-label">Thin variant (4px)</p>
      <div class="progress" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100" aria-label="Progress" style="height:4px">
        <div class="progress-indicator" style="transform:translateX(-55%)"></div>
      </div>
    </section>

    <!-- 7. Dark mode -->
    <section data-theme="dark" style="background:var(--surface-page);padding:24px;border-radius:var(--radius-lg)">
      <p class="grp-label">Dark mode</p>
      <div style="display:flex;flex-direction:column;gap:var(--space-4)">
        <div class="progress" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100" aria-label="Progress">
          <div class="progress-indicator" style="transform:translateX(-40%)"></div>
        </div>
        <div class="progress progress--indeterminate" role="progressbar" aria-valuetext="indeterminate" aria-label="Loading">
          <div class="progress-indicator"></div>
        </div>
      </div>
    </section>

  </main>
</body>
</html>
