<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Badge - states harness</title>
<link rel="stylesheet" href="../theme.css" />
<style>
  .badge{
    display:inline-flex;align-items:center;justify-content:center;gap:var(--space-1);white-space:nowrap;
    border:1px solid transparent;border-radius:var(--badge-radius);padding:var(--space-0-5) var(--space-2);
    font-size:var(--font-size-xs);font-weight:var(--badge-font-weight);line-height:var(--line-tight);
  }
  .badge .ico{width:var(--icon-xs);height:var(--icon-xs);stroke:currentColor;fill:none;stroke-width:2}
  .badge--default{background:var(--badge-default-bg);color:var(--badge-default-text)}
  .badge--secondary{background:var(--badge-secondary-bg);color:var(--badge-secondary-text)}
  .badge--destructive{background:var(--badge-destructive-bg);color:var(--badge-destructive-text)}
  .badge--outline{border-color:var(--badge-outline-border);color:var(--badge-outline-text)}

  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-page);color:var(--text-primary);font-family:Inter,system-ui,sans-serif;padding:32px}
  .stack{display:flex;flex-direction:column;gap:24px;max-width:680px;margin:0 auto}
  .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .grp-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);margin:0 0 8px}
  [data-theme="dark"] .grp-label{color:var(--gray-400)}
</style>
</head>
<body>
  <main class="stack">
    <section>
      <p class="grp-label">Variants</p>
      <div class="row">
        <span class="badge badge--default">Default</span>
        <span class="badge badge--secondary">Secondary</span>
        <span class="badge badge--destructive">Destructive</span>
        <span class="badge badge--outline">Outline</span>
      </div>
    </section>
    <section>
      <p class="grp-label">With icon &amp; numbers</p>
      <div class="row">
        <span class="badge badge--secondary"><svg class="ico" aria-hidden="true" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Verified</span>
        <span class="badge badge--default">8</span>
        <span class="badge badge--destructive">99+</span>
        <span class="badge badge--secondary">20</span>
      </div>
    </section>
  </main>
</body>
</html>
