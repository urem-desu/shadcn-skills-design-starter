<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alert - states harness</title>
<link rel="stylesheet" href="../theme.css" />
<style>
  /* ===== Alert component CSS (mirrors alert.tsx) ========================== */
  .alert{
    position:relative;display:grid;grid-template-columns:0 1fr;align-items:start;row-gap:var(--space-0-5);
    border-radius:var(--radius-lg);border:1px solid var(--border-default);background:var(--surface-card);
    padding:var(--space-3) var(--space-4);font-size:var(--font-size-sm);
  }
  .alert:has(> svg){grid-template-columns:var(--icon-md) 1fr;column-gap:var(--space-3)}
  .alert > svg{width:var(--icon-md);height:var(--icon-md);transform:translateY(var(--space-0-5));
    color:currentColor;stroke:currentColor;fill:none;stroke-width:2;flex:none}
  .alert-title{grid-column-start:2;min-height:var(--space-4);font-weight:var(--font-weight-medium);line-height:var(--line-tight);margin:0}
  .alert-desc{grid-column-start:2;color:var(--text-secondary);line-height:var(--line-normal);margin:0}
  .alert--default{color:var(--text-primary)}
  .alert--destructive{color:var(--text-destructive)}
  .alert--destructive .alert-desc{color:var(--text-destructive)}

  /* ===== harness chrome =================================================== */
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-page);color:var(--text-primary);
    font-family:Inter,system-ui,-apple-system,sans-serif;padding:32px}
  .stack{display:flex;flex-direction:column;gap:16px;max-width:560px;margin:0 auto}
  .grp-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);margin:8px 0 0}
  [data-theme="dark"] .grp-label{color:var(--gray-400)}
</style>
</head>
<body>
  <main class="stack">
    <p class="grp-label">Default</p>
    <div class="alert alert--default" role="alert">
      <svg aria-hidden="true" viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg>
      <p class="alert-title">Heads up!</p>
      <p class="alert-desc">You can add components to your app using the CLI.</p>
    </div>

    <p class="grp-label">Title only</p>
    <div class="alert alert--default" role="alert">
      <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <p class="alert-title">This action cannot be undone.</p>
    </div>

    <p class="grp-label">Destructive</p>
    <div class="alert alert--destructive" role="alert">
      <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
      <p class="alert-title">Unable to process your payment.</p>
      <p class="alert-desc">Please verify your billing information and try again.</p>
    </div>
  </main>
</body>
</html>
