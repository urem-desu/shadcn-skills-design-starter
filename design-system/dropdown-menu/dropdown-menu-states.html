<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dropdown Menu - states harness</title>
<link rel="stylesheet" href="../theme.css" />
<style>
  /* ===== Dropdown Menu component CSS (mirrors dropdown-menu.tsx) ========== */
  .menu{
    min-width:var(--dropdown-min-w);max-width:var(--dropdown-max-w);overflow:hidden;
    border-radius:var(--radius-lg);border:1px solid var(--border-default);
    background:var(--surface-card);padding:var(--space-1);color:var(--text-primary);box-shadow:var(--shadow-lg);
  }
  .menu-label{padding:var(--space-1-5) var(--space-2);font-size:var(--font-size-xs);
    font-weight:var(--font-weight-semibold);color:var(--text-secondary)}
  .menu-sep{height:1px;margin:var(--space-1) calc(var(--space-1) * -1);background:var(--border-default)}
  .menu-item{
    position:relative;display:flex;align-items:center;gap:var(--space-2);
    border-radius:var(--radius-sm);padding:var(--space-1-5) var(--space-2);
    font-size:var(--font-size-sm);line-height:var(--line-tight);color:var(--text-primary);
    border:0;width:100%;background:transparent;font-family:inherit;text-align:left;cursor:default;outline:none;
  }
  .menu-item .ico{width:var(--icon-sm);height:var(--icon-sm);stroke:currentColor;fill:none;stroke-width:2;flex:none}
  .menu-item.inset{padding-left:var(--space-6)}
  .menu-item .indicator{position:absolute;left:var(--space-2);display:flex;width:var(--icon-sm);height:var(--icon-sm);align-items:center;justify-content:center}
  .menu-item:hover,.menu-item:focus-visible{background:var(--action-secondary)}
  .menu-item:focus-visible{box-shadow:var(--focus-ring)}
  .menu-item[aria-disabled="true"]{pointer-events:none;opacity:.5}
  .menu-item--destructive{color:var(--menu-item-destructive-text)}
  .menu-item--destructive:hover,.menu-item--destructive:focus-visible{background:var(--menu-item-destructive-bg-hover);color:var(--menu-item-destructive-text)}
  .menu-shortcut{margin-left:auto;font-size:var(--font-size-xs);letter-spacing:.1em;color:var(--text-secondary)}
  .menu-item .chev{margin-left:auto}

  /* trigger */
  .b{display:inline-flex;align-items:center;gap:var(--space-2);height:var(--control-md);padding-inline:var(--space-4);
    border:1px solid var(--field-border);border-radius:var(--radius-md);background:var(--surface-card);color:var(--text-primary);
    font:inherit;font-weight:var(--font-weight-medium);font-size:var(--font-size-base);cursor:pointer;outline:none}
  .b:focus-visible{box-shadow:var(--focus-ring)}
  .b .ico{width:var(--icon-sm);height:var(--icon-sm);stroke:currentColor;fill:none;stroke-width:2}

  /* ===== harness chrome =================================================== */
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-page);color:var(--text-primary);
    font-family:Inter,system-ui,-apple-system,sans-serif;padding:32px}
  .stack{display:flex;flex-wrap:wrap;gap:40px;align-items:flex-start;max-width:760px;margin:0 auto}
  .col{display:flex;flex-direction:column;gap:12px}
  .grp-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);margin:0}
  [data-theme="dark"] .grp-label{color:var(--gray-400)}
</style>
</head>
<body>
  <main class="stack">
    <div class="col">
      <p class="grp-label">Trigger</p>
      <button class="b" aria-haspopup="menu" aria-expanded="false">
        Open
        <svg class="ico" aria-hidden="true" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
      </button>
    </div>

    <div class="col">
      <p class="grp-label">Open menu - items, shortcuts, sub, destructive, disabled</p>
      <div class="menu" role="menu" aria-label="My account">
        <p class="menu-label">My Account</p>
        <button class="menu-item" role="menuitem">
          <svg class="ico" aria-hidden="true" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile <span class="menu-shortcut">&#8679;&#8984;P</span>
        </button>
        <button class="menu-item" role="menuitem">
          <svg class="ico" aria-hidden="true" viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
          Billing <span class="menu-shortcut">&#8984;B</span>
        </button>
        <button class="menu-item" role="menuitem">
          <svg class="ico" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4"/></svg>
          Settings <span class="menu-shortcut">&#8984;S</span>
        </button>
        <div class="menu-sep" role="separator"></div>
        <p class="menu-label">Appearance</p>
        <button class="menu-item inset" role="menuitemcheckbox" aria-checked="true">
          <span class="indicator"><svg class="ico" aria-hidden="true" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>
          Status bar
        </button>
        <button class="menu-item inset" role="menuitemcheckbox" aria-checked="false">
          Activity bar
        </button>
        <div class="menu-sep" role="separator"></div>
        <button class="menu-item" role="menuitem" aria-haspopup="menu">
          <svg class="ico" aria-hidden="true" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          Invite users
          <svg class="ico chev" aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <button class="menu-item" role="menuitem" aria-disabled="true" tabindex="-1">
          <svg class="ico" aria-hidden="true" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          API access <span class="menu-shortcut">Soon</span>
        </button>
        <div class="menu-sep" role="separator"></div>
        <button class="menu-item menu-item--destructive" role="menuitem">
          <svg class="ico" aria-hidden="true" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Delete account <span class="menu-shortcut">&#8679;&#8984;&#9003;</span>
        </button>
      </div>
    </div>
  </main>
</body>
</html>
