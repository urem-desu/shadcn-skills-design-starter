<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Textarea — states harness</title>
<link rel="stylesheet" href="../theme.css" />
<style>
  .ta{
    inline-size:100%;font-family:inherit;resize:vertical;
    border-radius:var(--field-radius);background:var(--field-bg);color:var(--field-text);
    border:1px solid var(--field-border);padding:var(--space-2) var(--space-3);font-size:var(--font-size-base);
    line-height:var(--line-normal);outline:none;
    transition:border-color var(--transition-micro),box-shadow var(--transition-micro)}
  .ta::placeholder{color:var(--field-placeholder)}
  .ta:hover{border-color:var(--field-border-hover)}
  .ta:focus-visible{border-color:var(--field-border-focus);box-shadow:var(--field-focus-ring)}
  .ta:disabled{opacity:.5;cursor:not-allowed;background:var(--field-bg-disabled)}
  .ta[aria-invalid="true"]{border-color:var(--field-border-error)}
  .ta[aria-invalid="true"]:focus-visible{box-shadow:var(--field-focus-ring-error)}
  .field{display:flex;flex-direction:column;gap:var(--space-1-5);max-inline-size:360px}
  .lbl{font-size:var(--label-size);font-weight:var(--label-weight);color:var(--label-text);line-height:var(--line-tight)}
  .help{font-size:var(--font-size-sm);color:var(--text-secondary)}
  .err{font-size:var(--font-size-sm);color:var(--feedback-error-text)}

  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-page);color:var(--text-primary);font-family:Inter,system-ui,sans-serif;padding:32px}
  .stack{display:flex;flex-direction:column;gap:24px;max-width:760px;margin:0 auto}
  .row{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start}
  .grp-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-500);margin:0 0 8px}
  [data-theme="dark"] .grp-label{color:var(--gray-400)}
</style>
</head>
<body>
  <main class="stack">
    <section>
      <p class="grp-label">States</p>
      <div class="row">
        <div class="field"><label class="lbl" for="t-d">Default</label><textarea id="t-d" class="ta" rows="3" placeholder="Type your message here."></textarea></div>
        <div class="field"><label class="lbl" for="t-dis">Disabled</label><textarea id="t-dis" class="ta" rows="3" placeholder="Type your message here." disabled></textarea></div>
      </div>
    </section>
    <section>
      <p class="grp-label">With label &amp; helper</p>
      <div class="field">
        <label class="lbl" for="t-bio">Bio</label>
        <textarea id="t-bio" class="ta" rows="3" placeholder="Tell us a bit about yourself" aria-describedby="t-bio-h"></textarea>
        <p class="help" id="t-bio-h">You can @mention other users and organizations.</p>
      </div>
    </section>
    <section>
      <p class="grp-label">Error</p>
      <div class="field">
        <label class="lbl" for="t-e">Message</label>
        <textarea id="t-e" class="ta" rows="3" aria-invalid="true" aria-describedby="t-e-msg">x</textarea>
        <p class="err" id="t-e-msg">Message must be at least 10 characters.</p>
      </div>
    </section>
  </main>
</body>
</html>
