name: CI

# Quality gates: tokens + contrast + spec + no-emoji + npm test on every push and PR.
# A change that introduces an unresolved alias, a contrast regression, an off-theme
# value, or an emoji cannot merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Validate tokens (DTCG structure + alias resolution)
        run: python3 scripts/validate_tokens.py

      - name: Validate contrast (batch WCAG, light + dark)
        run: python3 scripts/validate_contrast.py

      - name: Validate component specs
        run: python3 scripts/validate_component_spec.py

      - name: No emoji in UI / taste / instruction surface
        run: python3 scripts/check_no_emoji.py

      - name: Test
        run: npm test --if-present
